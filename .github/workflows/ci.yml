name: CI Backend

on:
  push:
    branches: [ main, equipe ] # Adicione aqui o nome da branch que você está usando agora
  pull_request:
    branches: [ main ]

jobs:
  test-suite: # É este nome que vai aparecer no Status Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_pass
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check Compilation
        run: npm run build

      - name: Run E2E Tests
        env:
          DB_MYSQL_HOST: localhost
          DB_MYSQL_PORT: 3306
          DB_MYSQL_USER: root
          DB_MYSQL_PASS: test_pass
          DB_MYSQL_NAME: test_db
          DB_MONGO_URI: mongodb://localhost:27017/test_db
        run: npm run test:e2e