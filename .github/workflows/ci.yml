name: CI Backend - Build & Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test-suite:
    runs-on: ubuntu-latest

    # Aqui definimos os bancos de dados que o GitHub vai subir
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_pass
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Check Compilation (Build)
        run: npm run build

      - name: Run E2E Tests
        env:
          # Passamos as variáveis para o ambiente do teste
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: test_pass
          DB_NAME: test_db
          MONGO_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: my-secret
        run: npm run test:e2e